<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay to Tanishq</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background-color:#1a0000;
  background-image: url("https://i.ibb.co/LDqXv9nf/background.jpg");
  background-repeat: repeat-y;
  background-position: top center;
  background-size: contain;
  display:flex;
  justify-content:center;
}

.page{
  width:100%;
  max-width:420px;
  padding:26px 18px 40px;
  text-align:center;
  font-family:'Montserrat', sans-serif;
  color:#fff;
}

/* HEADER — VERY TALL, ONE LINE */
.title{
  font-size:38px;
  font-weight:900;
  letter-spacing:3.5px;
  margin-bottom:26px;

  white-space: nowrap;
  line-height:1.35;           /* taller vertical spacing */
  transform: scaleY(1.35);    /* BIG vertical stretch */
}

/* QR WRAP */
.qr-wrap{
  width:270px;
  margin:0 auto 18px;
  background:#8b0000;
  border:7px solid #000;
  border-radius:20px;
  padding:12px;
}

.qr-wrap img{
  width:100%;
  border-radius:12px;
  display:block;
}

/* UPI TEXT */
.upi{
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
}

.hr{
  height:2px;
  width:100%;
  background:#fff;
  margin:10px 0 18px;
}

/* SUBTEXT */
.open-text{
  font-size:22px;
  font-weight:700;
  margin-bottom:22px;
}

/* BUTTONS */
.btn{
  display:block;
  width:100%;
  padding:16px 0;
  margin-bottom:16px;
  border-radius:18px;
  background: rgba(150, 0, 0, 0.65);
  color:#ffffff;
  font-size:18px;
  font-weight:500;
  text-decoration:none;
}
</style>
</head>

<body>
  <div class="page">

    <div class="title">PAY TO TANISHQ</div>

    <div class="qr-wrap">
      <img src="https://i.ibb.co/vvz7qSty/IMG-8571.jpg" alt="UPI QR">
    </div>

    <div class="upi">UPI ID - 8827514415@idfcfirst</div>

    <div class="hr"></div>

    <div class="open-text">Click to Open UPI Apps</div>

    <a class="btn" href="upi://pay?pa=8827514415@idfcfirst">Default UPI App</a>
    <a class="btn" href="tez://upi/pay?pa=8827514415@idfcfirst">Google Pay</a>
    <a class="btn" href="paytmmp://pay?pa=8827514415@idfcfirst">Paytm</a>
    <a class="btn" href="phonepe://pay?pa=8827514415@idfcfirst">PhonePe</a>

  </div>
</body>
</html>
